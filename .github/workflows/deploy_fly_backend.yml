name: Deploy Backends to Fly.io

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "backend-node/**"
      - ".github/workflows/deploy_fly_backend.yml"
  workflow_dispatch:

jobs:
  deploy-fastapi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
      uses: actions/checkout@v4

      - name: Setup flyctl
      uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy FastAPI app
      run: flyctl deploy --config backend/fly.toml --remote-only
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
      uses: actions/checkout@v4

      - name: Setup flyctl
      uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Node app
      run: flyctl deploy --config backend-node/fly.toml --remote-only
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
